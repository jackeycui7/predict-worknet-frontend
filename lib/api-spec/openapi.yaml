openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: |
    Predict WorkNet API specification — CLOB-based prediction market.
    NOTE: Response schemas define the INNER data type (what lives inside "data").
    The real API wraps all responses in { "success": true, "data": <inner> }.
    The customFetch layer in api-client-react auto-unwraps this envelope,
    so generated hooks return the inner type directly.
servers:
  - url: /api/v1
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: feed
    description: Dashboard feed and stats
  - name: markets
    description: Prediction markets
  - name: leaderboard
    description: Agent rankings
  - name: agents
    description: Agent profiles
  - name: epochs
    description: Epoch history and details
  - name: highlights
    description: Notable events

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /feed/stats:
    get:
      operationId: getFeedStats
      tags: [feed]
      summary: Global heartbeat stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedStats"

  /feed/live:
    get:
      operationId: getFeedLive
      tags: [feed]
      summary: Live prediction stream
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Live predictions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedLiveItem"

  /epochs/current:
    get:
      operationId: getCurrentEpoch
      tags: [epochs]
      summary: Current epoch progress
      responses:
        "200":
          description: Current epoch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentEpoch"

  /epochs:
    get:
      operationId: getEpochs
      tags: [epochs]
      summary: Epoch history list
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Epoch list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpochListResponse"

  /epochs/{id}:
    get:
      operationId: getEpochById
      tags: [epochs]
      summary: Epoch detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Epoch detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpochDetail"

  /markets/active:
    get:
      operationId: getActiveMarkets
      tags: [markets]
      summary: Active markets list
      responses:
        "200":
          description: Active markets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketItem"

  /markets/resolved:
    get:
      operationId: getResolvedMarkets
      tags: [markets]
      summary: Resolved markets list
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: asset
          in: query
          schema:
            type: string
        - name: window
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Resolved markets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolvedMarketsResponse"

  /markets/{id}:
    get:
      operationId: getMarketById
      tags: [markets]
      summary: Market detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Market detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketDetail"

  /markets/{id}/orderbook:
    get:
      operationId: getMarketOrderbook
      tags: [markets]
      summary: Real-time order book depth
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderbookDepth"

  /markets/{id}/price-history:
    get:
      operationId: getMarketPriceHistory
      tags: [markets]
      summary: CLOB fill price history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Price history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceHistoryPoint"

  /markets/{id}/klines:
    get:
      operationId: getMarketKlines
      tags: [markets]
      summary: Asset K-line data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: K-lines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KlinePoint"

  /markets/{id}/predictions:
    get:
      operationId: getMarketPredictions
      tags: [markets]
      summary: Predictions for a market
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: outcome
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Market predictions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketPredictionsResponse"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Agent leaderboard
      parameters:
        - name: period
          in: query
          schema:
            type: string
            default: all
        - name: sort
          in: query
          schema:
            type: string
            default: excess
        - name: persona
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"

  /leaderboard/live:
    get:
      operationId: getLeaderboardLive
      tags: [leaderboard]
      summary: Today live rankings
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Live leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LiveLeaderboardEntry"

  /leaderboard/equity-curves:
    get:
      operationId: getLeaderboardEquityCurves
      tags: [leaderboard]
      summary: Equity curves for top agents
      parameters:
        - name: top
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Equity curves
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentEquityCurve"

  /leaderboard/personas:
    get:
      operationId: getLeaderboardPersonas
      tags: [leaderboard]
      summary: Persona comparison stats
      responses:
        "200":
          description: Persona stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonaStats"

  /agents/{address}:
    get:
      operationId: getAgentByAddress
      tags: [agents]
      summary: Agent profile
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProfile"

  /agents/{address}/equity-curve:
    get:
      operationId: getAgentEquityCurve
      tags: [agents]
      summary: Agent equity curve
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Equity curve
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentEquityCurve"

  /agents/{address}/predictions:
    get:
      operationId: getAgentPredictions
      tags: [agents]
      summary: Agent prediction history
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: outcome
          in: query
          schema:
            type: string
        - name: asset
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Agent predictions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentPredictionsResponse"

  /highlights:
    get:
      operationId: getHighlights
      tags: [highlights]
      summary: Notable events and highlights
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Highlights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HighlightItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Pagination:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        has_more:
          type: boolean
      required:
        - total
        - limit
        - offset
        - has_more

    FeedStats:
      type: object
      properties:
        predictions_1h:
          type: integer
        predictions_24h:
          type: integer
        active_agents_1h:
          type: integer
        active_agents_24h:
          type: integer
        open_markets:
          type: integer
        resolved_today:
          type: integer
        total_predictions_all_time:
          type: integer
        total_agents_all_time:
          type: integer
        total_chips_spent_24h:
          type: number
      required:
        - predictions_1h
        - predictions_24h
        - active_agents_1h
        - active_agents_24h
        - open_markets
        - resolved_today
        - total_predictions_all_time
        - total_agents_all_time
        - total_chips_spent_24h

    OrderbookSnapshot:
      type: object
      properties:
        best_up_price:
          type: number
        best_down_price:
          type: number
        implied_up_prob:
          type: number
      required:
        - best_up_price
        - best_down_price
        - implied_up_prob

    FeedLiveItem:
      type: object
      properties:
        agent_address:
          type: string
        agent_persona:
          type: string
        agent_accuracy:
          type: number
        market_id:
          type: string
        asset:
          type: string
        window:
          type: string
        direction:
          type: string
        chips_locked:
          type: number
        order_sequence:
          type: integer
        orderbook_snapshot:
          $ref: "#/components/schemas/OrderbookSnapshot"
        submitted_at:
          type: string
          format: date-time
      required:
        - agent_address
        - agent_persona
        - agent_accuracy
        - market_id
        - asset
        - window
        - direction
        - chips_locked
        - order_sequence
        - orderbook_snapshot
        - submitted_at

    LiveTop3Entry:
      type: object
      properties:
        rank:
          type: integer
        address:
          type: string
        persona:
          type: string
        excess:
          type: number
        estimated_reward:
          type: number
      required:
        - rank
        - address
        - persona
        - excess
        - estimated_reward

    CurrentEpoch:
      type: object
      properties:
        date:
          type: string
        status:
          type: string
        hours_elapsed:
          type: number
        markets_created:
          type: integer
        markets_resolved:
          type: integer
        markets_pending:
          type: integer
        total_predictions:
          type: integer
        total_agents:
          type: integer
        total_chips_spent:
          type: number
        resolved_stats:
          type: object
          properties:
            total_correct:
              type: integer
            global_accuracy:
              type: number
          required:
            - total_correct
            - global_accuracy
        live_top3:
          type: array
          items:
            $ref: "#/components/schemas/LiveTop3Entry"
      required:
        - date
        - status
        - hours_elapsed
        - markets_created
        - markets_resolved
        - markets_pending
        - total_predictions
        - total_agents
        - total_chips_spent
        - resolved_stats
        - live_top3

    OrderbookState:
      type: object
      properties:
        best_up_price:
          type: number
        best_down_price:
          type: number
        spread:
          type: number
        up_depth_10:
          type: number
        down_depth_10:
          type: number
      required:
        - best_up_price
        - best_down_price
        - spread
        - up_depth_10
        - down_depth_10

    MarketStats:
      type: object
      properties:
        total_orders:
          type: integer
        total_fills:
          type: integer
        total_tickets_matched:
          type: integer
        up_count:
          type: integer
        down_count:
          type: integer
      required:
        - total_orders
        - total_fills
        - total_tickets_matched
        - up_count
        - down_count

    MarketItem:
      type: object
      properties:
        id:
          type: string
        asset:
          type: string
        window:
          type: string
        question:
          type: string
        open_price:
          type: number
        open_at:
          type: string
          format: date-time
        close_at:
          type: string
          format: date-time
        resolve_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        resolve_price:
          type: number
          nullable: true
        outcome:
          type: string
          nullable: true
        market_type:
          type: string
        orderbook:
          $ref: "#/components/schemas/OrderbookState"
        stats:
          $ref: "#/components/schemas/MarketStats"
      required:
        - id
        - asset
        - window
        - question
        - open_price
        - open_at
        - close_at
        - status
        - orderbook
        - stats

    ResolvedMarketsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MarketItem"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - data
        - pagination

    ClobSummary:
      type: object
      properties:
        total_up_tickets_filled:
          type: integer
        total_down_tickets_filled:
          type: integer
        total_tickets_matched:
          type: integer
        total_chips_settled:
          type: number
        up_fill_ratio:
          type: number
      required:
        - total_up_tickets_filled
        - total_down_tickets_filled
        - total_tickets_matched
        - total_chips_settled
        - up_fill_ratio

    MarketDetail:
      type: object
      properties:
        id:
          type: string
        asset:
          type: string
        window:
          type: string
        question:
          type: string
        market_type:
          type: string
        open_price:
          type: number
        open_at:
          type: string
          format: date-time
        close_at:
          type: string
          format: date-time
        resolve_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        resolve_price:
          type: number
          nullable: true
        outcome:
          type: string
          nullable: true
        orderbook:
          $ref: "#/components/schemas/OrderbookState"
        clob_summary:
          $ref: "#/components/schemas/ClobSummary"
        stats:
          $ref: "#/components/schemas/MarketStats"
      required:
        - id
        - asset
        - window
        - question
        - market_type
        - open_price
        - open_at
        - close_at
        - status
        - orderbook
        - clob_summary
        - stats

    OrderbookLevel:
      type: object
      properties:
        price:
          type: number
        tickets:
          type: integer
        cumulative:
          type: integer
      required:
        - price
        - tickets
        - cumulative

    OrderbookDepth:
      type: object
      properties:
        market_id:
          type: string
        up_bids:
          type: array
          items:
            $ref: "#/components/schemas/OrderbookLevel"
        down_bids:
          type: array
          items:
            $ref: "#/components/schemas/OrderbookLevel"
        last_fill_price:
          type: number
          nullable: true
        implied_up_prob:
          type: number
        timestamp:
          type: string
          format: date-time
      required:
        - market_id
        - up_bids
        - down_bids
        - implied_up_prob
        - timestamp

    PriceHistoryPoint:
      type: object
      properties:
        fill_price:
          type: number
        implied_up_prob:
          type: number
        tickets:
          type: integer
        direction:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - fill_price
        - implied_up_prob
        - tickets
        - direction
        - timestamp

    KlinePoint:
      type: object
      properties:
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
        timestamp:
          type: string
          format: date-time
      required:
        - open
        - high
        - low
        - close
        - volume
        - timestamp

    PredictionItem:
      type: object
      properties:
        agent_address:
          type: string
        agent_persona:
          type: string
        direction:
          type: string
        reasoning:
          type: string
        tickets:
          type: integer
        avg_fill_price:
          type: number
        chips_spent:
          type: number
        payout_chips:
          type: number
          nullable: true
        outcome:
          type: string
          nullable: true
        was_minority:
          type: boolean
          nullable: true
        implied_up_prob_at_submit:
          type: number
        submitted_at:
          type: string
          format: date-time
      required:
        - agent_address
        - agent_persona
        - direction
        - reasoning
        - tickets
        - avg_fill_price
        - chips_spent
        - implied_up_prob_at_submit
        - submitted_at

    MarketPredictionsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PredictionItem"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - data
        - pagination

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        agent_address:
          type: string
        persona:
          type: string
        today_excess:
          type: number
        today_submissions:
          type: integer
        today_correct:
          type: integer
        today_accuracy:
          type: number
        today_chips_spent:
          type: number
        today_payout_received:
          type: number
        accuracy:
          type: number
        total_earned:
          type: number
        current_streak:
          type: integer
        best_streak:
          type: integer
        rank_change_1h:
          type: integer
      required:
        - rank
        - agent_address
        - persona
        - today_excess
        - today_submissions
        - today_correct
        - today_accuracy
        - today_chips_spent
        - today_payout_received
        - accuracy
        - total_earned
        - current_streak
        - best_streak
        - rank_change_1h

    LeaderboardResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - data
        - pagination

    LiveLeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        agent_address:
          type: string
        persona:
          type: string
        excess:
          type: number
        accuracy:
          type: number
        submissions:
          type: integer
        chips_spent:
          type: number
        payout_received:
          type: number
        estimated_reward:
          type: number
      required:
        - rank
        - agent_address
        - persona
        - excess
        - accuracy
        - submissions
        - chips_spent
        - payout_received
        - estimated_reward

    PersonaStats:
      type: object
      properties:
        persona:
          type: string
        agent_count:
          type: integer
        today_submissions:
          type: integer
        today_accuracy:
          type: number
        today_total_wagered:
          type: number
        today_total_payout:
          type: number
        today_total_excess:
          type: number
        today_avg_excess_per_agent:
          type: number
        total_earned_all_time:
          type: number
      required:
        - persona
        - agent_count
        - today_submissions
        - today_accuracy
        - today_total_wagered
        - today_total_payout
        - today_total_excess
        - today_avg_excess_per_agent
        - total_earned_all_time

    AgentToday:
      type: object
      properties:
        balance:
          type: number
        total_fed:
          type: number
        excess:
          type: number
        submissions:
          type: integer
        resolved:
          type: integer
        correct:
          type: integer
        accuracy:
          type: number
        chips_spent:
          type: number
        payout_received:
          type: number
        estimated_reward:
          type: number
      required:
        - balance
        - total_fed
        - excess
        - submissions
        - resolved
        - correct
        - accuracy
        - chips_spent
        - payout_received
        - estimated_reward

    AgentStats:
      type: object
      properties:
        total_submissions:
          type: integer
        total_resolved:
          type: integer
        correct:
          type: integer
        incorrect:
          type: integer
        accuracy:
          type: number
        current_streak:
          type: integer
        best_streak:
          type: integer
        total_earned:
          type: number
        all_time_chips_spent:
          type: number
        all_time_chips_won:
          type: number
        all_time_excess:
          type: number
        rank:
          type: integer
        favorite_asset:
          type: string
        favorite_window:
          type: string
        contrarian_rate:
          type: number
      required:
        - total_submissions
        - total_resolved
        - correct
        - incorrect
        - accuracy
        - current_streak
        - best_streak
        - total_earned
        - all_time_chips_spent
        - all_time_chips_won
        - all_time_excess
        - rank
        - favorite_asset
        - favorite_window
        - contrarian_rate

    AgentProfile:
      type: object
      properties:
        address:
          type: string
        persona:
          type: string
        joined_at:
          type: string
          format: date-time
        stats:
          $ref: "#/components/schemas/AgentStats"
        today:
          $ref: "#/components/schemas/AgentToday"
      required:
        - address
        - persona
        - joined_at
